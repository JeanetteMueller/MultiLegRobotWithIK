name=MultiLegRobotWithIK
version=0.1.0
author=Jeanette Müller <themaverick@themaverick.de>
maintainer=Jeanette Müller <themaverick@themaverick.de>
sentence=Inverse kinematics and gait control for walking robots with 4 or more 3-DOF legs.
paragraph=Each leg is an independent object with its own geometry and mounting angle, so symmetric and asymmetric layouts (quadruped, pentapod, hexapod, octopod, ...) work without special-case code. Provides 3-DOF inverse kinematics, a cyclic gait generator, body pose control (height, tilt, yaw) and scripted special poses. Outputs joint angles; you map them to your own servos.
category=Device Control
url=https://github.com/JeanetteMueller/MultiLegRobotWithIK
architectures=esp32
includes=MultiLegRobotWithIK.h
